<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="../Common/js/iframe-phone.js" language="javascript"></script>
  <script src="../Common/js/CodapInterface.js"></script>
  <title>Import a dataset</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="urlBlock">
    <input placeholder="Enter a URL..." type="url" id="urlUploader">
    <button id="urlButton" class="inline-child">Import</button>
  </div>
  <p id="logs" class="inline-child"></p>

  <div id="infoBlock">
    <p>Find a dataset through one of the <b>following websites</b> and paste the URL here. Supported file formats are <b>CSV</b> and <b>JSON</b>.</p>
  </div>
  <div id="linkBlock">
    <a href="https://huggingface.co/datasets" target="_blank">Hugging Face</a>
    <a href="https://www.kaggle.com/datasets" target="_blank">Kaggle</a>
    <a href="https://data.public.lu/en/datasets/" target="_blank">Luxembourgish Open Data Platform</a><br>
    <a href="https://data-explorer.oecd.org/" target="_blank">OECD Data Explorer</a>
    <a href="https://data360.worldbank.org/en/search" target="_blank">World Bank Open Data</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script type="module" src="./js/codap/CODAPConnect.js"></script>
  <script type="module" src="./js/codap/CaseTable.js"></script>
  <script type="module" src="./js/codap/Controller.js"></script>

  <script type="module" src="./js/parsers/Parser.js"></script>
  <script type="module" src="./js/parsers/CSVParser.js"></script>
  <script type="module" src="./js/parsers/JSONParser.js"></script>

  <script type="module" src="./js/importers/Importer.js"></script>
  <script type="module" src="./js/importers/HuggingFaceImporter.js"></script>
  <script type="module" src="./js/importers/KaggleImporter.js"></script>
  <script type="module" src="./js/importers/OECDImporter.js"></script>
  <script type="module" src="./js/importers/WorldBankImporter.js"></script>
  <script type="module" src="./js/importers/DataPublicImporter.js"></script>

  <script type="module" src="./js/Main.js"></script>
</body>
</html>
